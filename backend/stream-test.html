<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ollama Stream API Test</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-soft: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --user: #2563eb;
      --assistant: #374151;
      --border: #334155;
      --ok: #22c55e;
      --warn: #eab308;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      height: calc(100vh - 32px);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      overflow: auto;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .row {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--muted);
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      padding: 9px 10px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .buttons {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    button {
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      border-color: #64748b;
    }

    .chat-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    #status {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #messages {
      flex: 1;
      overflow: auto;
      padding-right: 6px;
    }

    .msg {
      max-width: 86%;
      padding: 10px 12px;
      border-radius: 14px;
      margin-bottom: 10px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      margin-left: auto;
      background: var(--user);
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      margin-right: auto;
      background: var(--assistant);
      border-bottom-left-radius: 4px;
    }

    .assistant-group {
      max-width: 86%;
      margin-right: auto;
      margin-bottom: 10px;
    }

    .response-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .thinking {
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 6px;
      background: #0b1220;
      overflow: hidden;
    }

    .thinking summary {
      list-style: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      padding: 8px 10px;
      border-bottom: 1px solid transparent;
      user-select: none;
    }

    .thinking summary::-webkit-details-marker {
      display: none;
    }

    .thinking[open] summary {
      border-bottom-color: var(--border);
    }

    .thinking-content {
      padding: 8px 10px 10px;
      font-size: 12px;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 220px;
      overflow: auto;
    }

    .composer {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .status-ok {
      color: var(--ok);
    }

    .status-warn {
      color: var(--warn);
    }

    .status-error {
      color: var(--error);
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      .panel {
        max-height: none;
      }

      .chat-wrap {
        min-height: 65vh;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="panel">
      <h1>Stream API Settings</h1>
      <div class="hint">ChatGPT-style stream test for <code>POST /api/ollama/stream</code></div>

      <div class="row">
        <label for="baseUrl">Backend Base URL</label>
        <input id="baseUrl" value="http://localhost:5000" />
      </div>

      <div class="row">
        <label for="apiKey">x-api-key</label>
        <input id="apiKey" value="subrata0000" />
      </div>

      <div class="row">
        <label for="model">Model</label>
        <select id="model">
          <option value="mistral:7b">mistral:7b</option>
          <option value="llama3.1:latest">llama3.1:latest</option>
          <option value="qcwind/qwen2.5-7B-instruct-Q4_K_M:latest">qcwind/qwen2.5-7B-instruct-Q4_K_M:latest</option>
          <option value="gemma3:4b">gemma3:4b</option>
          <option value="deepseek-r1:1.5b-qwen-distill-q4_K_M" selected>deepseek-r1:1.5b-qwen-distill-q4_K_M</option>
          <option value="deepseek-r1:8b">deepseek-r1:8b</option>
        </select>
      </div>

      <div class="buttons">
        <button id="stopBtn">Stop</button>
        <button id="clearBtn">Clear Chat</button>
      </div>
    </aside>

    <main class="panel chat-wrap">
      <div id="status">Status: idle</div>
      <div id="messages"></div>

      <div class="composer">
        <div class="row">
          <label for="prompt">Message</label>
          <textarea id="prompt" placeholder="Ask anything..."></textarea>
        </div>
        <button id="startBtn">Send</button>
      </div>
    </main>
  </div>

  <script>
    let controller = null;

    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const promptEl = document.getElementById("prompt");

    function setStatus(text) {
      statusEl.textContent = `Status: ${text}`;
      statusEl.className = "";
      if (text.startsWith("failed") || text.startsWith("error")) {
        statusEl.classList.add("status-error");
      } else if (text === "streaming" || text === "connecting") {
        statusEl.classList.add("status-warn");
      } else if (text === "done" || text === "completed") {
        statusEl.classList.add("status-ok");
      }
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function createMessageBubble(role, content) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = content || "";
      messagesEl.appendChild(el);
      scrollToBottom();
      return el;
    }

    function createAssistantGroup() {
      const group = document.createElement("div");
      group.className = "assistant-group";

      const thinkingBox = document.createElement("details");
      thinkingBox.className = "thinking";
      thinkingBox.open = true;

      const summary = document.createElement("summary");
      summary.textContent = "Thinking...";

      const thinkingContent = document.createElement("div");
      thinkingContent.className = "thinking-content";

      thinkingBox.appendChild(summary);
      thinkingBox.appendChild(thinkingContent);

      const answerBubble = document.createElement("div");
      answerBubble.className = "msg assistant";

      const responseMeta = document.createElement("div");
      responseMeta.className = "response-meta";

      group.appendChild(thinkingBox);
      group.appendChild(answerBubble);
      group.appendChild(responseMeta);
      messagesEl.appendChild(group);
      scrollToBottom();

      return {
        group,
        thinkingBox,
        thinkingContent,
        answerBubble,
        responseMeta,
        hasThinking: false,
        hasAnswer: false,
      };
    }

    function formatElapsedSeconds(startTimeMs) {
      const elapsedMs = Date.now() - startTimeMs;
      const totalSeconds = elapsedMs / 1000;
      if (totalSeconds < 60) {
        return `${totalSeconds.toFixed(2)}s`;
      }

      const totalMinutes = Math.floor(totalSeconds / 60);
      const secondsRemainder = totalSeconds % 60;
      if (totalMinutes < 60) {
        return `${totalMinutes}m ${secondsRemainder.toFixed(2)}s`;
      }

      const totalHours = Math.floor(totalMinutes / 60);
      const minutesRemainder = totalMinutes % 60;
      return `${totalHours}h ${minutesRemainder}m ${secondsRemainder.toFixed(2)}s`;
    }

    function extractChunk(payload) {
      if (payload.message && typeof payload.message.content === "string" && payload.message.content.length > 0) {
        return { type: "answer", text: payload.message.content };
      }
      if (payload.message && typeof payload.message.thinking === "string") {
        return { type: "thinking", text: payload.message.thinking };
      }
      if (typeof payload.response === "string" && payload.response.length > 0) {
        return { type: "answer", text: payload.response };
      }
      return { type: "none", text: "" };
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function startStream() {
      if (controller) {
        controller.abort();
      }

      const baseUrl = document.getElementById("baseUrl").value.trim();
      const apiKey = document.getElementById("apiKey").value.trim();
      const model = document.getElementById("model").value.trim();
      const prompt = promptEl.value.trim();

      if (!baseUrl || !apiKey || !model || !prompt) {
        setStatus("Please fill all fields");
        return;
      }

      createMessageBubble("user", prompt);
      const assistant = createAssistantGroup();
      const startedAtMs = Date.now();
      promptEl.value = "";
      const MAX_ATTEMPTS = 2;

      try {
        for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt += 1) {
          controller = new AbortController();
          setStatus(attempt === 1 ? "connecting" : "reconnecting");

          const response = await fetch(`${baseUrl}/api/ollama/stream`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey
            },
            body: JSON.stringify({
              model,
              messages: [{ role: "user", content: prompt }]
            }),
            signal: controller.signal
          });

          if (!response.ok || !response.body) {
            throw new Error(`HTTP ${response.status}`);
          }

          setStatus("streaming");
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          let streamErrorMessage = "";
          let chunkReceived = false;

          while (true) {
            const { value, done } = await reader.read();
            if (done) {
              break;
            }

            buffer += decoder.decode(value, { stream: true });
            const events = buffer.split("\n\n");
            buffer = events.pop() || "";

            for (const eventBlock of events) {
              const lines = eventBlock.split("\n");
              let eventName = "message";
              let data = "";

              for (const line of lines) {
                if (line.startsWith(":")) {
                  continue;
                }
                if (line.startsWith("event:")) {
                  eventName = line.slice(6).trim();
                }
                if (line.startsWith("data:")) {
                  data += line.slice(5).trim();
                }
              }

              if (eventName === "done") {
                setStatus("done");
                continue;
              }

              if (eventName === "error") {
                streamErrorMessage = data || "unknown stream error";
                continue;
              }

              if (data) {
                try {
                  const payload = JSON.parse(data);
                  const chunk = extractChunk(payload);
                  if (chunk.type === "thinking" && chunk.text) {
                    chunkReceived = true;
                    assistant.hasThinking = true;
                    assistant.thinkingContent.textContent += chunk.text;
                    assistant.thinkingBox.open = true;
                    scrollToBottom();
                  } else if (chunk.type === "answer" && chunk.text) {
                    chunkReceived = true;
                    assistant.hasAnswer = true;
                    assistant.answerBubble.textContent += chunk.text;
                    if (assistant.hasThinking) {
                      assistant.thinkingBox.open = false;
                    }
                    scrollToBottom();
                  }
                } catch (err) {
                  assistant.answerBubble.textContent += `\n[parse error] ${String(err)}\n`;
                  scrollToBottom();
                }
              }
            }
          }

          if (streamErrorMessage) {
            throw new Error(streamErrorMessage);
          }

          if (chunkReceived || attempt === MAX_ATTEMPTS) {
            break;
          }

          setStatus("warming up model, retrying...");
          await sleep(1200);
        }

        if (!assistant.hasThinking) {
          assistant.thinkingBox.style.display = "none";
        }
        if (!assistant.hasAnswer) {
          assistant.answerBubble.textContent = "(no final answer content from model)";
        }
        assistant.responseMeta.textContent = `Time taken: ${formatElapsedSeconds(startedAtMs)}`;

        if (statusEl.textContent === "Status: streaming") {
          setStatus("completed");
        }
      } catch (err) {
        assistant.responseMeta.textContent = `Time taken: ${formatElapsedSeconds(startedAtMs)}`;
        if (err.name === "AbortError") {
          setStatus("aborted");
        } else {
          setStatus(`failed: ${err.message}`);
        }
      } finally {
        controller = null;
      }
    }

    function stopStream() {
      if (controller) {
        controller.abort();
      }
    }

    document.getElementById("startBtn").addEventListener("click", startStream);
    document.getElementById("stopBtn").addEventListener("click", stopStream);
    document.getElementById("clearBtn").addEventListener("click", () => {
      messagesEl.innerHTML = "";
      setStatus("idle");
    });

    promptEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        startStream();
      }
    });
  </script>
</body>

</html>
